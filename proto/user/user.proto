syntax = "proto3";

package user.v1;

option go_package = "github.com/new-timlieberman/gitasy2.0/proto/user";
service UserService {
  rpc CreateUser(CreateUserRequest)
      returns (UserResponse);

  rpc GetUser(GetUserRequest)
      returns (UserResponse);

}

message CreateUserRequest {
  string email = 1;
  string password_hash = 2;
}

message UserResponse {
  int32 id = 1;
  string email = 2;
}

message GetUserRequest {
  int32 id = 1;
  string email = 2;
}